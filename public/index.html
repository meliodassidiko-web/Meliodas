 <!DOCTYPE html>
<html lang="tl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Portfolio</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        body {
            margin: 0;
            padding: 20px 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(rgba(139, 94, 26, 0.7), rgba(41, 29, 10, 0.9)), 
                        url('https://unsplash.com') no-repeat center center fixed;
            background-size: cover;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            max-width: 420px;
            width: 90%;
            padding: 30px 20px;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            box-shadow: 0 10px 35px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .profile-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 15px;
        }

        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid #f3e5ab;
            object-fit: cover;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        h1 {
            font-size: 26px;
            margin: 10px 0 5px 0;
            font-family: 'Georgia', serif;
            font-style: italic;
            color: #f3e5ab;
        }

        .subtitle {
            font-size: 13px;
            color: #dddddd;
            margin-bottom: 25px;
            letter-spacing: 0.5px;
        }

        .music-player {
            background: rgba(0, 0, 0, 0.4);
            padding: 12px;
            border-radius: 50px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .music-info {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: #f3e5ab;
            padding-left: 10px;
        }

        .play-btn {
            background: #f3e5ab;
            color: #291d0a;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .play-btn:hover {
            transform: scale(1.1);
            background: #ffffff;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .link-card {
            display: flex;
            align-items: center;
            padding: 14px 20px;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            font-size: 15px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .link-card i {
            font-size: 20px;
            margin-right: 15px;
            width: 25px;
            text-align: center;
        }

        .link-card .arrow {
            margin-left: auto;
            font-size: 12px;
            opacity: 0.7;
        }

        .link-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.25);
        }

        .facebook { background: #1877F2; }
        .tiktok { background: #000000; border: 1px solid rgba(255,255,255,0.2); }
        .youtube { background: #FF0000; }
        .instagram { background: linear-gradient(45deg, #405de6, #5851db, #833ab4, #c13584, #e1306c, #fd1d1d); }

        .divider {
            border-top: 1px dashed rgba(255, 255, 255, 0.2);
            margin: 25px 0;
        }

        .console-box {
            background: rgba(0, 0, 0, 0.5);
            font-family: 'Courier New', Courier, monospace;
            padding: 15px;
            border-radius: 8px;
            text-align: left;
            border-left: 3px solid #f3e5ab;
            font-size: 13px;
            line-height: 1.5;
            color: #aaeebb;
        }

        .console-header {
            color: #f3e5ab;
            font-weight: bold;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Profile Component -->
        <div class="profile-wrapper">
            <img class="profile-img" src="https://i.imgur.com/JJmX2kW.jpeg" alt="Profile Picture">
        </div>
        <h1>MIKEY</h1>
        <div class="subtitle">CONNECT WITH ME THROUGH MY SOCIALS</div>

        <!-- Audio Player Component -->
        <div class="music-player">
            <div class="music-info">
                <i class="fa-solid fa-music"></i>
                <span id="track-title">Bensound - Creative Minds</span>
            </div>
            <audio id="bg-music" src="https://j.top4top.io/m_3831m6hla2.mp3"></audio>
            <button class="play-btn" onclick="toggleMusic()" id="play-button">
                <i class="fa-solid fa-play" id="play-icon"></i>
            </button>
        </div>

        <!-- Navigation Links -->
        <div class="links-container">
            <a href="https://www.facebook.com/profile.php?id=61590786745020" target="_blank" class="link-card facebook">
                <i class="fa-brands fa-facebook-f"></i>
                <span>Facebook</span>
                <i class="fa-solid fa-chevron-right arrow"></i>
            </a>
            
            <a href="https://tiktok.com" target="_blank" class="link-card tiktok">
                <i class="fa-brands fa-tiktok"></i>
                <span>TikTok</span>
                <i class="fa-solid fa-chevron-right arrow"></i>
            </a>

            <a href="https://www.youtube.com/@MikeySynai" target="_blank" class="link-card youtube">
                <i class="fa-brands fa-youtube"></i>
                <span>YouTube</span>
                <i class="fa-solid fa-chevron-right arrow"></i>
            </a>

            <a href="https://instagram.com" target="_blank" class="link-card instagram">
                <i class="fa-brands fa-instagram"></i>
                <span>Instagram</span>
                <i class="fa-solid fa-chevron-right arrow"></i>
            </a>
        </div>

        <div class="divider"></div>

        <!-- Terminal Output -->
        <div class="console-box">
            <div class="console-header">[ SYSTEM MESSAGE ]</div>
            <div>> Status: Online</div>
            <div>> Group: Bislig Squad (Active since 2023)</div>
            <div>> Notice: This portfolio is currently running secure scripts. Feel free to explore the active links above.</div>
        </div>
    </div>

    <!-- Core Logic Scripts -->
    <script>
        const music = document.getElementById('bg-music');
        const playIcon = document.getElementById('play-icon');

        function toggleMusic() {
            if (music.paused) {
                music.play().catch(error => console.log("Audio playback delayed until user interaction."));
                playIcon.className = "fa-solid fa-pause";
            } else {
                music.pause();
                playIcon.className = "fa-solid fa-play";
            }
        }
    </script>
</body>
</html>
